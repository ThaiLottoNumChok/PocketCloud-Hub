<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสลากกินแบ่งรัฐบาล</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
        }
        body {
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
        }
        header {
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
        }
        header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.2rem;
        }
        .container {
            max-width: 700px;
            margin: -20px auto 2rem auto;
            padding: 0 1rem;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .card h3 {
            margin-bottom: 1rem;
            color: #1b5e20;
            border-bottom: 2px solid #e8f5e9;
            padding-bottom: 0.5rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #444;
        }
        input[type="text"], select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus, select:focus {
            border-color: #2e7d32;
        }
        .btn {
            background-color: #2e7d32;
            color: white;
            border: none;
            width: 100%;
            padding: 0.75rem;
            font-size: 1.1rem;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #1b5e20;
        }
        .result-section {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            display: none;
        }
        .result-success {
            background-color: #e8f5e9;
            border: 1px solid #c8e6c9;
            color: #2e7d32;
        }
        .result-fail {
            background-color: #ffebee;
            border: 1px solid #ffcdd2;
            color: #c62828;
        }
        .prize-list {
            margin-top: 0.5rem;
            padding-left: 1.2rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>ตรวจสลากกินแบ่งรัฐบาล</h1>
    </header>

    <div class="container">
        
        <!-- ส่วนที่เลือกงวดส่วนกลาง -->
        <div class="card">
            <div class="form-group" style="margin-bottom: 0;">
                <label for="drawDate">เลือกงวดประจำวันที่:</label>
                <select id="drawDate">
                    <option value="2026-07-16">16 กรกฎาคม 2569</option>
                    <option value="2026-07-01">1 กรกฎาคม 2569</option>
                </select>
            </div>
        </div>

        <!-- 1. ตรวจรางวัล 6 หลัก -->
        <div class="card">
            <h3>ตรวจรางวัล 6 หลัก (รางวัลที่ 1-5 และข้างเคียง)</h3>
            <div class="form-group">
                <label for="lottery6">หมายเลขสลาก (6 หลัก):</label>
                <input type="text" id="lottery6" maxlength="6" placeholder="เช่น 639214">
            </div>
            <button class="btn" onclick="check6Digits()">ตรวจสอบรางวัล 6 หลัก</button>
            <div id="resultBox6" class="result-section">
                <p id="resultText6"></p>
                <ul id="resultList6" class="prize-list"></ul>
            </div>
        </div>

        <!-- 2. ตรวจเลขหน้า 3 ตัว -->
        <div class="card">
            <h3>ตรวจรางวัลเลขหน้า 3 ตัว</h3>
            <div class="form-group">
                <label for="front3">หมายเลข 3 ตัวหน้า:</label>
                <input type="text" id="front3" maxlength="3" placeholder="เช่น 683">
            </div>
            <button class="btn" onclick="checkFront3()">ตรวจสอบเลขหน้า 3 ตัว</button>
            <div id="resultBoxFront3" class="result-section">
                <p id="resultTextFront3"></p>
            </div>
        </div>

        <!-- 3. ตรวจเลขท้าย 3 ตัว -->
        <div class="card">
            <h3>ตรวจรางวัลเลขท้าย 3 ตัว</h3>
            <div class="form-group">
                <label for="last3">หมายเลข 3 ตัวท้าย:</label>
                <input type="text" id="last3" maxlength="3" placeholder="เช่น 746">
            </div>
            <button class="btn" onclick="checkLast3()">ตรวจสอบเลขท้าย 3 ตัว</button>
            <div id="resultBoxLast3" class="result-section">
                <p id="resultTextLast3"></p>
            </div>
        </div>

        <!-- 4. ตรวจเลขท้าย 2 ตัว -->
        <div class="card">
            <h3>ตรวจรางวัลเลขท้าย 2 ตัว</h3>
            <div class="form-group">
                <label for="last2">หมายเลข 2 ตัวท้าย:</label>
                <input type="text" id="last2" maxlength="2" placeholder="เช่น 71">
            </div>
            <button class="btn" onclick="checkLast2()">ตรวจสอบเลขท้าย 2 ตัว</button>
            <div id="resultBoxLast2" class="result-section">
                <p id="resultTextLast2"></p>
            </div>
        </div>

    </div>

    <script>
        const lotteryDatabase = {
            "2026-07-16": {
                prize1: "639214",
                sidePrize1: ["639213", "639215"],
                prize2: ["041103", "468769", "766948", "846088", "997512"],
                prize3: ["065731", "171022", "218479", "227673", "436300", "552474", "568691", "791742", "807458", "936500"],
                prize4: ["017061", "181212", "276804", "399866", "524743", "654462", "713623", "752291", "820623", "859979"],
                prize5: ["013563", "153201", "268889", "339088", "435582", "596396", "680354", "788655", "851550", "915969"],
                front3: ["683", "709"],
                last3: ["746", "427"],
                last2: "71"
            },
            "2026-07-01": {
                prize1: "751495",
                sidePrize1: ["751494", "751496"],
                prize2: ["370059", "418597", "476642", "699829", "902369"],
                prize3: ["046311", "222683", "231094", "234654", "300311", "406138", "445814", "478059", "520943", "660172"],
                prize4: ["019808", "150458", "263833", "333429", "404995", "488755", "587450", "690707", "814794", "949936"],
                prize5: ["041327", "261007", "359945", "411656", "491077", "527828", "624516", "714198", "822015", "924098"],
                front3: ["001", "980"],
                last3: ["304", "531"],
                last2: "62"
            }
        };

        // 1. ตรวจ 6 หลัก
        function check6Digits() {
            const val = document.getElementById('lottery6').value.trim();
            const date = document.getElementById('drawDate').value;
            const box = document.getElementById('resultBox6');
            const text = document.getElementById('resultText6');
            const list = document.getElementById('resultList6');
            list.innerHTML = '';

            if (val.length !== 6 || isNaN(val)) {
                box.style.display = 'block';
                box.className = 'result-section result-fail';
                text.innerHTML = '<strong>กรุณากรอกเลขให้ครบ 6 หลัก</strong>';
                return;
            }

            const draw = lotteryDatabase[date];
            let matched = [];

            if (val === draw.prize1) matched.push("🎉 รางวัลที่ 1 (6,000,000 บาท)");
            if (draw.sidePrize1.includes(val)) matched.push("✨ รางวัลข้างเคียงรางวัลที่ 1 (100,000 บาท)");
            if (draw.prize2.includes(val)) matched.push("🥈 รางวัลที่ 2 (200,000 บาท)");
            if (draw.prize3.includes(val)) matched.push("🥉 รางวัลที่ 3 (80,000 บาท)");
            if (draw.prize4.includes(val)) matched.push("🏅 รางวัลที่ 4 (40,000 บาท)");
            if (draw.prize5.includes(val)) matched.push("🎖️ รางวัลที่ 5 (20,000 บาท)");

            box.style.display = 'block';
            if (matched.length > 0) {
                box.className = 'result-section result-success';
                text.innerHTML = `<strong>ยินดีด้วยครับ! คุณถูกรางวัล:</strong>`;
                matched.forEach(p => {
                    let li = document.createElement('li');
                    li.textContent = p;
                    list.appendChild(li);
                });
            } else {
                box.className = 'result-section result-fail';
                text.innerHTML = 'เสียใจด้วยครับ หมายเลขนี้ไม่ถูกรางวัล 6 หลัก';
            }
        }

        // 2. ตรวจเลขหน้า 3 ตัว
        function checkFront3() {
            const val = document.getElementById('front3').value.trim();
            const date = document.getElementById('drawDate').value;
            const box = document.getElementById('resultBoxFront3');
            const text = document.getElementById('resultTextFront3');

            if (val.length !== 3 || isNaN(val)) {
                box.style.display = 'block';
                box.className = 'result-section result-fail';
                text.innerHTML = '<strong>กรุณากรอกเลขหน้าให้ครบ 3 หลัก</strong>';
                return;
            }

            const draw = lotteryDatabase[date];
            box.style.display = 'block';
            if (draw.front3.includes(val)) {
                box.className = 'result-section result-success';
                text.innerHTML = `<strong>🎯 ยินดีด้วยครับ! ถูกรางวัลเลขหน้า 3 ตัว (4,000 บาท)</strong>`;
            } else {
                box.className = 'result-section result-fail';
                text.innerHTML = 'เสียใจด้วยครับ หมายเลขนี้ไม่ถูกรางวัลเลขหน้า 3 ตัว';
            }
        }

        // 3. ตรวจเลขท้าย 3 ตัว
        function checkLast3() {
            const val = document.getElementById('last3').value.trim();
            const date = document.getElementById('drawDate').value;
            const box = document.getElementById('resultBoxLast3');
            const text = document.getElementById('resultTextLast3');

            if (val.length !== 3 || isNaN(val)) {
                box.style.display = 'block';
                box.className = 'result-section result-fail';
                text.innerHTML = '<strong>กรุณากรอกเลขท้ายให้ครบ 3 หลัก</strong>';
                return;
            }

            const draw = lotteryDatabase[date];
            box.style.display = 'block';
            if (draw.last3.includes(val)) {
                box.className = 'result-section result-success';
                text.innerHTML = `<strong>🎯 ยินดีด้วยครับ! ถูกรางวัลเลขท้าย 3 ตัว (4,000 บาท)</strong>`;
            } else {
                box.className = 'result-section result-fail';
                text.innerHTML = 'เสียใจด้วยครับ หมายเลขนี้ไม่ถูกรางวัลเลขท้าย 3 ตัว';
            }
        }

        // 4. ตรวจเลขท้าย 2 ตัว
        function checkLast2() {
            const val = document.getElementById('last2').value.trim();
            const date = document.getElementById('drawDate').value;
            const box = document.getElementById('resultBoxLast2');
            const text = document.getElementById('resultTextLast2');

            if (val.length !== 2 || isNaN(val)) {
                box.style.display = 'block';
                box.className = 'result-section result-fail';
                text.innerHTML = '<strong>กรุณากรอกเลขท้ายให้ครบ 2 หลัก</strong>';
                return;
            }

            const draw = lotteryDatabase[date];
            box.style.display = 'block';
            if (val === draw.last2) {
                box.className = 'result-section result-success';
                text.innerHTML = `<strong>🎯 ยินดีด้วยครับ! ถูกรางวัลเลขท้าย 2 ตัว (2,000 บาท)</strong>`;
            } else {
                box.className = 'result-section result-fail';
                text.innerHTML = 'เสียใจด้วยครับ หมายเลขนี้ไม่ถูกรางวัลเลขท้าย 2 ตัว';
            }
        }
    </script>

</body>
</html>
