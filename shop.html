<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PocketCloud Shop - สินค้าแนะนำ</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Prompt', sans-serif; }
        body { background-color: #f4f7f6; color: #333; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; color: #ff5722; font-size: 24px; }
        .product-card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .product-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: #222; }
        .product-desc { font-size: 14px; color: #666; margin-bottom: 15px; }
        .btn-buy { display: inline-block; background: #ee4d2d; color: #fff; padding: 10px 20px; border-radius: 6px; text-decoration: none; font-size: 15px; font-weight: 600; text-align: center; width: 100%; }
        .btn-buy:hover { background: #d73211; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #666; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🛒 คลังสินค้าแนะนำของฉัน</h1>

        <!-- รายการสินค้าที่ 1 (แบบมีแต่ข้อความและปุ่มสั่งซื้อ) -->
        <div class="product-card">
            <div class="product-title">น้ำมันพืช (แพ็ก 12 ขวด) ขนาด 250 มล.</div>
            <div class="product-desc">น้ำมันพืชคุณภาพดีสำหรับทำอาหาร คุ้มค่าแพ็กใหญ่ ราคาประหยัด</div>
            <!-- ลิงก์ Affiliate ของพี่เจมส์ -->
            <a href="https://s.shopee.co.th/6AjeGOawtU" target="_blank" class="btn-buy">👉 ไปที่ร้านค้า / สั่งซื้อ</a>
        </div>

        <!-- 
          วิธีเพิ่มสินค้าชิ้นต่อไปในอนาคต:
          ก๊อปปี้บล็อก <div class="product-card">...</div> ด้านบนนี้มาวางต่อ แล้วเปลี่ยนชื่อสินค้าและลิงก์ใหม่ได้เลยครับ
        -->

        <a href="index.html" class="back-link">⬅️ กลับหน้าหลัก PocketCloud Hub</a>
    </div>

</body>
</html>
